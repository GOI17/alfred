name: Require Linked Issue

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  require-linked-issue:
    name: Require linked issue
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR workflow
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || "";
            const branch = pr.head.ref;

            const closingKeyword = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/i;
            const match = body.match(closingKeyword);

            if (!match) {
              core.setFailed("PR body must link an issue using a closing keyword, for example: Closes #123.");
              return;
            }

            const issueNumber = Number(match[1]);
            const expectedBranchPrefix = new RegExp(`^(issue-|fix-|feat-|chore-)?${issueNumber}[-/]`);
            const explicitIssueBranch = new RegExp(`^issue-${issueNumber}[-/]`);

            if (!expectedBranchPrefix.test(branch) && !explicitIssueBranch.test(branch)) {
              core.setFailed(`Branch '${branch}' must include the linked issue number ${issueNumber}, for example: issue-${issueNumber}-short-description.`);
              return;
            }

            try {
              await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
              });
            } catch (error) {
              core.setFailed(`Linked issue #${issueNumber} does not exist or cannot be read.`);
            }
